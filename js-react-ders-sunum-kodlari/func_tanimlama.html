<h4>Fonksiyon Tanımlama</h4>
<h5>Klasik Tanımlama (Function Declaration)</h5>
<script>
  function selamVer(isim) {
    console.log("Merhaba " + isim);
  }
</script>
<h5>İsimsiz Fonksiyon (Function Expression)</h5>
<script>
  var selamVer2 = function (isim) {
    console.log("Merhaba " + isim);
  };
</script>

<h5>Ok Fonksiyonu (Arrow Function)</h5>
<script>
  var selamVer3 = (isim) => {
    console.log("Merhaba " + isim);
  };
</script>

<script>
  selamVer("Ahmet");
  selamVer2("Mehmet");
  selamVer3("Ayşe");
</script>
