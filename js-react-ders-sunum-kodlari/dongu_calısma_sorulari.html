<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Break ve Continue Örnekleri</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      h2 {
        margin-top: 30px;
      }
      pre {
        background-color: #f0f0f0;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Break ve Continue Örnekleri</h1>

    <button onclick="sayiTahmin()">1. Sayı Tahmin Oyunu (break)</button>
    <pre id="tahminSonuc"></pre>

    <button onclick="pozitifToplam()">
      2. Pozitif Sayıların Toplamı (continue)
    </button>
    <pre id="toplamSonuc"></pre>

    <button onclick="asalSayilar()">3. İlk 10 Asal Sayı (break)</button>
    <pre id="asalSonuc"></pre>

    <button onclick="ciftSayilar()">
      4. 1–20 Arası Çift Sayılar (continue)
    </button>
    <pre id="ciftSonuc"></pre>

    <button onclick="diziFiltrele()">
      5. Dizi Elemanları Filtreleme (break + continue)
    </button>
    <pre id="diziSonuc"></pre>

    <script>
      // 1. Sayı Tahmin Oyunu (break)
      function sayiTahmin() {
        const hedef = Math.floor(Math.random() * 50) + 1;
        let tahmin;
        let mesaj = "";
        while (true) {
          tahmin = parseInt(prompt("1–50 arasında tahmin giriniz:"));
          if (tahmin === hedef) {
            mesaj = "Tebrikler! Doğru tahmin: " + hedef;
            break;
          } else if (tahmin < hedef) {
            alert("Daha büyük bir sayı deneyin!");
          } else {
            alert("Daha küçük bir sayı deneyin!");
          }
        }
        document.getElementById("tahminSonuc").textContent = mesaj;
      }

      // 2. Pozitif Sayıların Toplamı (continue)
      function pozitifToplam() {
        let toplam = 0;
        for (let i = 1; i <= 5; i++) {
          let sayi = parseInt(prompt(i + ". sayıyı giriniz:"));
          if (sayi < 0) {
            alert("Negatif sayılar toplama dahil edilmez.");
            continue;
          }
          toplam += sayi;
        }
        document.getElementById("toplamSonuc").textContent =
          "Pozitif sayıların toplamı: " + toplam;
      }

      // 3. İlk 10 Asal Sayı (break)
      function asalSayilar() {
        let asal = [];
        for (let i = 2; i < 100; i++) {
          let isAsal = true;
          for (let j = 2; j < i; j++) {
            if (i % j === 0) {
              isAsal = false;
              break;
            }
          }
          if (isAsal) {
            asal.push(i);
            if (asal.length === 10) break;
          }
        }
        document.getElementById("asalSonuc").textContent =
          "İlk 10 asal sayı: " + asal.join(", ");
      }

      // 4. 1–20 Arası Çift Sayılar (continue)
      function ciftSayilar() {
        let cift = [];
        for (let i = 1; i <= 20; i++) {
          if (i % 2 !== 0) continue;
          cift.push(i);
        }
        document.getElementById("ciftSonuc").textContent =
          "Çift sayılar: " + cift.join(", ");
      }

      // 5. Dizi Elemanları Filtreleme (break + continue)
      function diziFiltrele() {
        const dizi = [12, -5, 18, 0, 25, -3, 40];
        let sonuc = [];
        for (let i = 0; i < dizi.length; i++) {
          if (dizi[i] < 0) continue;
          if (dizi[i] > 30) break;
          sonuc.push(dizi[i]);
        }
        document.getElementById("diziSonuc").textContent =
          "Filtrelenmiş sayılar: " + sonuc.join(", ");
      }
    </script>
  </body>
</html>
