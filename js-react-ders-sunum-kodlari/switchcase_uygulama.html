<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>Switch-Case Örneği</title>
  </head>
  <body>
    <script>
      let hava = "Gunesli";
      switch (hava) {
        case "Yagmurlu":
          console.log("Semsiyeni yanina almayi unutma");
          break;
        case "Gunesli":
          console.log("Hafif giyin");
        case "Bulutlu":
          console.log("Disari cik");
          break;
        case "Karlı":
          console.log("Kalin giyin");
          break;
        case "Firtinali":
          console.log("Bir süre disari cikma");
          break;
        default:
          console.log("Bilinmeyen hava durumu:", hava);
      }
    </script>
  </body>
</html>
