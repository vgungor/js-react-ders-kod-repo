<h2>Kullanım Örneği</h2>
<script>
  const kullanicilar = ["Ali", "Ayşe", "Mehmet"];

  kullanicilar.forEach((isim, index) => {
    document.write(`${index + 1}. Kullanıcı: ${isim} <br>`);
  });
  // Çıktı:
  // 1. Kullanıcı: Ali
  // 2. Kullanıcı: Ayşe
  // 3. Kullanıcı: Mehmet
</script>
<h2>Kullanım Örneği 2</h2>
<script>
  let sayilar = [1, 2, 3, 4, 5];

  sayilar.forEach((sayi) => {
    document.write(sayi * 2);
    document.write("<br>");
  });
</script>
