<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />

    <title>Tek If Örneği</title>
  </head>
  <body>
    <script>
      let sayi = prompt("Lütfen bir sayı giriniz:");
      sayi = Number(sayi);
      if (sayi > 0) {
        document.write("Girilen sayı pozitif: " + sayi);
      }
    </script>
  </body>
</html>
