<script>
  let isimler = ["ali", "ayşe", "mehmet"];
  let buyuk = isimler.map((isim) => isim.toUpperCase());

  for (let i = 0; i < buyuk.length; i++) {
    document.write(isimler[i] + " -> " + buyuk[i] + "<br>");
  }
</script>
<hr />
