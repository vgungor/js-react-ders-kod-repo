<script>
  async function veriGetir() {
    try {
      const response = await fetch(
        "https://jsonplaceholder.typicode.com/posts/1",
      );

      // Bağlantı başarılı mı kontrol et (404 veya 500 hatalarını yakalamak için)
      if (!response.ok) {
        throw new Error("Ağ yanıtı düzgün değil: " + response.status);
      }

      const data = await response.json();
      document.write("Gelen Veri: " + JSON.stringify(data));
    } catch (error) {
      document.write("İşlem sırasında hata oluştu: " + error.message);
    }
  }

  veriGetir();
</script>
