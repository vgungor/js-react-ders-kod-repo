<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template Title</title>
  </head>
  <body>
    <script>
      for (let i = 1; i <= 3; i++) {
        // Dış döngü (Satırlar)
        document.write("Dış döngü adım: " + i + "<br>");

        for (let j = 1; j <= 2; j++) {
          // İç döngü (Sütunlar)
          document.write(" &emsp;İç döngü adım: " + j + "<br>");
        }
      }
    </script>
  </body>
</html>
