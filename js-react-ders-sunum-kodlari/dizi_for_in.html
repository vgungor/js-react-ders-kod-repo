<script>
  const renkler = ["Kırmızı", "Mavi", "Yeşil"];

  for (let indeks in renkler) {
    document.write(indeks + ". indeks | anahtar veri türü: " + typeof indeks); // 0, 1, 2 (Dikkat: Bunlar aslında string'dir)
    document.write("<br>");
    document.write("değeri: " + renkler[indeks]); // Kırmızı, Mavi, Yeşil
    document.write("<br>");
  }
</script>
