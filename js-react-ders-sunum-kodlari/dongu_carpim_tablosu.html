<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template Title</title>
  </head>
  <body>
    <script>
      for (let i = 1; i <= 5; i++) {
        for (let j = 1; j <= 5; j++) {
          let satir = i + " x " + j + " = " + i * j;
          document.write(satir + "<br>");
        }
        document.write("<br>"); // Her satırdan sonra boşluk bırakmak için
      }
    </script>
  </body>
</html>
