<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template Title</title>
  </head>
  <body>
    <script>
      let sayac = 1;
      // 1. Başlangıç değeri (Döngü değişkeni)

      while (sayac <= 5) {
        // 2. Şart: sayac 5'ten küçük veya eşit olduğu sürece çalış
        document.write("Sayı: " + sayac + "<br>");

        sayac++;
        // 3. Artırma: Eğer bunu unutursanız "Sonsuz Döngü" oluşur!
      }

      document.write("Döngü bitti. Sayac: " + sayac);
    </script>
  </body>
</html>
