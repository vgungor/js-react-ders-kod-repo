<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Profil Kartı</title>
    <style>
      /* 1. Evrensel Seçici: Tarayıcı boşluklarını sıfırlayalım */
      * {
        margin: 10;
        padding: 10;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* 2. Class Seçicisi: Kartın ana yapısı */
      .profil-karti {
        margin-left: 10%;
        background-color: white;
        width: 80%;
        max-width: 600px;
        display: flex; /* İçerikleri yan yana dizer (Masaüstü için) */
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease; /* Yumuşak geçiş efekti */
      }

      /* Pseudo-class: Kartın üzerine gelince hafifçe büyüsün */
      .profil-karti:hover {
        transform: scale(1.02);
      }

      /* Görsel Alanı */
      .profil-resmi {
        flex: 1;
        background-color: #ddd;
        min-height: 200px;
      }

      .profil-resmi img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Resmi bozmadan alanı doldurur */
      }

      /* Metin Alanı */
      .icerik {
        flex: 2;
        padding: 20px;
      }

      /* ID Seçicisi: Benzersiz başlık */
      #kullanici-adi {
        color: #333;
        margin-bottom: 10px;
      }

      .buton {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      }

      .buton:hover {
        background-color: #0056b3;
      }

      /* 3. Medya Sorgusu (Responsive Kısmı) */
      /* Ekran genişliği 600px'den küçükse (Mobil) bu kurallar çalışır */
      @media (max-width: 600px) {
        .profil-karti {
          flex-direction: column; /* Yan yana duran öğeleri ALT ALTA al */
          width: 90%;
        }

        .icerik {
          text-align: center; /* Mobilde metni ortala */
        }
      }
    </style>
  </head>
  <body>
    <article class="profil-karti">
      <div class="profil-resmi">
        <img src="mvg-avatar.png" alt="Profil Fotoğrafı" />
      </div>

      <div class="icerik">
        <h2 id="kullanici-adi">Volkan Güngör</h2>
        <p>
          Yönetim Bilişim Sistemleri Doktora Öğrencisi. Dijital dönüşüm ve ağ
          yönetimi konularıyla ilgileniyor.
        </p>
        <a href="#" class="buton">Profili Gör</a>
      </div>
    </article>

    <article class="profil-karti">
      <div class="profil-resmi">
        <img src="patron.png" alt="Profil Fotoğrafı" />
      </div>

      <div class="icerik">
        <h2 id="kullanici-adi">N.A Daysee</h2>
        <p>
          Anaokulu Öğrencisi. Youtube Kids ve ebeveyn yönetimi konularıyla
          ilgileniyor.
        </p>
        <a href="#" class="buton">Profili Gör</a>
      </div>
    </article>
  </body>
</html>
