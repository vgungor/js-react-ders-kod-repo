<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Photo Gallery</title>
    <link rel="stylesheet" href="gallery.css" />
  </head>
  <body>
    <header>
      <h1>My Photo Gallery</h1>
      <nav>
        <a href="#all">All</a>
        <a href="#nature">Nature</a>
        <a href="#city">City</a>
        <a href="#people">People</a>
      </nav>
    </header>

    <main class="gallery">
      <div class="gallery-item">
        <img src="https://picsum.photos/400/300?random=1" alt="Photo 1" />
        <div class="overlay">
          <h3>Photo Title</h3>
          <p>Photo description</p>
        </div>
      </div>
      <div class="gallery-item">
        <img src="https://picsum.photos/400/300?random=2" alt="Photo 2" />
        <div class="overlay">
          <h3>Photo Title</h3>
          <p>Photo description</p>
        </div>
      </div>
      <!-- Add more gallery items -->
      <!-- Students should add at least 12 photos -->
    </main>

    <footer>
      <p>&copy; 2024 My Gallery. All rights reserved.</p>
    </footer>
  </body>
</html>
